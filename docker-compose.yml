services:
  vps-one:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: "${PYTHON_IMAGE:-python:3.12-slim}"
        PIP_INDEX_URL: "${PIP_INDEX_URL:-}"
    image: vps-one:python
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    env_file: .env
    ports:
      - "${VPS_ONE_PORT:-9080}:9080"
    volumes:
      - vps_one_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9080/healthz', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vps_one_data:
